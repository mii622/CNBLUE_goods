<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru&display=swap" rel="stylesheet">

<title>CNBLUE グッズ計算</title>

<style>
body{
  font-family: "Kiwi Maru", serif;
  font-weight: 400;
  font-style: normal;
  background:#3069a6;
  color:#fff;
  margin:0;
}

/* ヘッダー */
.header{
  position:sticky;
  top:0;
  background:#3069a6;
  padding:15px 10px 10px;
  text-align:center;
  z-index:10;
  border-bottom:1px solid #222;
}

.title{
  font-size:1.5rem;
  color:#ffffff;
}

.sub{
  font-size:1.0rem;
  opacity:0.4;
}

/* グリッド */
.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
  padding:15px;
  max-width:600px;
  margin:0 auto;
}

/* カード */
.card{
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  text-decoration:none;
  color:#000;
  transition:0.15s;
}

.card:active{
  transform:scale(0.97);
}

/* 画像 */
.card img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:0;
}

/* テキスト */
.card-body{
  padding:10px;
}

.card-title{
  font-size:0.9rem;
  font-weight:bold;
}

.new{
  color:#3069a6;
  font-size:0.7rem;
  margin-left:5px;
}

/* フッター固定ボタン */
.bottom-bar{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#3069a6;
  padding:10px;
  text-align:center;
  border-top:1px solid #333;
}

.home-btn{
  background:transparent;
  color:#fff;
  border:1.5px solid #fff;
  padding:6px 18px;
  border-radius:999px;
  text-decoration:none;
  font-size:0.9rem;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">CNBLUE goods calculater</div>
  <div class="sub">ツアーを選択</div>
</div>

<div class="grid">
<div class="section-title">LATEST</div>


  <!-- 最新 -->
  <a href="https://mii622.github.io/3LOGY/" class="card">
    <img src="Images/IMG_3LOGY.JPG">
    <div class="card-body">
      <div class="card-title">
        2026 3LOGY <span class="new">NEW</span>
      </div>
    </div>
  </a>
</div>

<div class="section-title">PAST</div>
  <a href="https://mii622.github.io/OneLastDay/" class="card">
    <img src="Images/IMG_onelastday.JPG">
    <div class="card-body">
      <div class="card-title">2026 One Last Day</div>
    </div>
  </a>

  <a href="https://mii622.github.io/2025XMAS/" class="card">
    <img src="Images/IMG_2025XMAS.JPG">
    <div class="card-body">
      <div class="card-title">2025 XMAS</div>
    </div>
  </a>

 <a href="https://mii622.github.io/2025kingdom/" class="card">
    <img src="Images/IMG_2025kingdom.JPG">
    <div class="card-body">
      <div class="card-title">2025 KINGDOM</div>
    </div>
  </a>
  
  <a href="https://mii622.github.io/SHINTOUYA/" class="card">
    <img src="Images/IMG_shintouya.JPG">
    <div class="card-body">
      <div class="card-title">2025 SHINTOUYA</div>
    </div>
  </a>

  <a href="https://mii622.github.io/Ofd622jyh/" class="card">
    <img src="Images/IMG_ourfinedays.JPG">
    <div class="card-body">
      <div class="card-title">2025 Our Fine Days</div>
    </div>
  </a>
</div> 

<div class="bottom-bar">
  <a href="#" class="home-btn">TOP</a>
</div>

</body>
</html>
