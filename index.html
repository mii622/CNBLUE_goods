<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&display=swap" rel="stylesheet">

<title>CNBLUE グッズ計算</title>

<style>
body{
  font-family: "Zen Maru Gothic", sans-serif;
  font-weight: 400;
  font-style: normal;
  background:linear-gradient(180deg,#3069a6,#1f4f80);
  color:#fff;
  margin:0;
}

/* ヘッダー */
.header{
  position:sticky;
  top:0;
  background:#3069a6;
  padding:15px 10px 10px;
  text-align:center;
  z-index:10;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(255,255,255,0.15);
  border-bottom-left-radius:18px;
  border-bottom-right-radius:18px;
}

.header::after{
  content:"";
  display:block;
  width:30px;
  height:3px;
  background:rgba(255,255,255,0.5);
  border-radius:10px;
  margin:12px auto 0;
}
  
.title{
  font-size:1.4rem;
  color:#ffffff;
  letter-spacing:1.2px;
}

.sub{
  font-size:0.85rem;
  opacity:0.6;
  margin-top:6px;
}

/* グリッド */
  .grid{
  max-width:600px;
  margin:0 auto;
  padding:20px;
  gap:16px;
  }


/* カード */
.card{
  background:rgba(255,255,255,0.92);
  border-radius:18px;
  overflow:hidden;
  text-decoration:none;
  color:#000;
  transition:0.15s;
  backdrop-filter:blur(6px);
  box-shadow:
    0 4px 10px rgba(0,0,0,0.08),
    0 10px 22px rgba(0,0,0,0.12);
}

.card:active{
  transform:scale(0.97);
}

/* 画像 */
.card img{
  width:100%;
  aspect-ratio:21/9;
  object-fit:cover;
}

/* テキスト */
.card-body{
  padding:10px 12px;
}

.card-title{
  font-size:0.9rem;;
  font-weight:500;
}

.new{
  background:rgba(48,105,166,0.15);
  color:#3069a6;
  font-size:0.65rem;
  padding:2px 6px;
  border-radius:999px;
  margin-left:6px;
}

.section-title{
  color:#ffffff;
  font-size:1.1rem;
  letter-spacing:1px;
  margin:10px 5px 0;
}

/* フッター固定ボタン */
.bottom-bar{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#3069a6;
  padding:10px;
  text-align:center;
  border-bottom:none;
  backdrop-filter:blur(16px);
  box-shadow: 0 -2px 6px rgba(0,0,0,0.2);
  background:rgba(255,255,255,0.2);
}

.home-btn{
  background:transparent;
  color:#fff;
  border:1.5px solid #fff;
  padding:6px 18px;
  border-radius:999px;
  text-decoration:none;
  font-size:0.9rem;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">CNBLUE goods calculater</div>
  <div class="sub">ツアーを選択</div>
</div>

<div class="grid">
<div class="section-title">LATEST</div>


  <!-- 最新 -->
  <a href="https://mii622.github.io/3LOGY/" class="card">
    <img src="Images/IMG_3LOGY.JPG">
    <div class="card-body">
      <div class="card-title">
        2026 3LOGY <span class="new">NEW</span>
      </div>
    </div>
  </a>

<div class="section-title">PAST</div>

  
  <a href="https://mii622.github.io/OneLastDay/" class="card">
    <img src="Images/IMG_onelastday.JPG">
    <div class="card-body">
      <div class="card-title">2026 One Last Day</div>
    </div>
  </a>

  <a href="https://mii622.github.io/2025XMAS/" class="card">
    <img src="Images/IMG_2025XMAS.JPG">
    <div class="card-body">
      <div class="card-title">2025 XMAS</div>
    </div>
  </a>

 <a href="https://mii622.github.io/2025kingdom/" class="card">
    <img src="Images/IMG_2025kingdom.JPG">
    <div class="card-body">
      <div class="card-title">2025 KINGDOM</div>
    </div>
  </a>
  
  <a href="https://mii622.github.io/SHINTOUYA/" class="card">
    <img src="Images/IMG_shintouya.JPG">
    <div class="card-body">
      <div class="card-title">2025 SHINTOUYA</div>
    </div>
  </a>

  <a href="https://mii622.github.io/Ofd622jyh/" class="card">
    <img src="Images/IMG_ourfinedays.JPG">
    <div class="card-body">
      <div class="card-title">2025 Our Fine Days</div>
    </div>
  </a>
</div> 

<div class="bottom-bar">
  <a href="#" class="home-btn">TOP</a>
</div>

</body>
</html>
